version: "3.9"

services:
  seisunix:
    build:
      context: .
      dockerfile: Dockerfile
    image: seisunix:latest
    container_name: seisunix_app
    volumes:
      - ./data:/data
      - ./output:/output
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
    stdin_open: true
    tty: true
    command: /bin/bash

  convert:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: fairfield-convert:latest
    container_name: fairfield_convert
    volumes:
      - ./data:/data
      - ./output:/output
    profiles:
      - convert
